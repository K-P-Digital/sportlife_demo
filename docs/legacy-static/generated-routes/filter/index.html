<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sportlife Filter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>

                      "surface-container": "#211f24",
                      "surface-bright": "#3b383e",
                      "on-primary-container": "#e0d2ff",
                      "surface-variant": "#36343a",
                      "outline-variant": "#494551",
                      "on-secondary": "#342b4b",
                      "primary-container": "#6750a4",
                      "on-error": "#690005",
                      "on-background": "#e6e0e9",
                      "secondary-fixed": "#e9ddff",
                      "primary-fixed": "#e9ddff",
                      "inverse-on-surface": "#322f35",
                      "on-tertiary-fixed-variant": "#594400",
                      "background": "#141218",
                      "on-primary": "#381e72",
                      "surface-container-highest": "#36343a",
                      "on-tertiary": "#3e2e00",
                      "on-primary-fixed": "#22005d",
                      "tertiary-container": "#c9a74d",
                      "surface": "#141218",
                      "secondary": "#cdc0e9",
                      "on-secondary-container": "#bfb2da",
                      "on-secondary-fixed": "#1f1635",
                      "primary-fixed-dim": "#cfbcff",
                      "on-surface": "#e6e0e9",
                      "primary": "#cfbcff",
                      "surface-tint": "#cfbcff",
                      "inverse-primary": "#6750a4",
                      "surface-container-high": "#2b292f",
                      "on-tertiary-container": "#503d00",
                      "on-tertiary-fixed": "#241a00",
                      "on-secondary-fixed-variant": "#4b4263",
                      "error": "#ffb4ab",
                      "surface-container-low": "#1d1b20",

                      "DEFAULT": "0.25rem",

                      "full": "9999px"

              "spacing": {},
              "fontFamily": {
                      "headline": [

                      "display": [

                      "body": [

                      "label": [

              "fontSize": {}

          },

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <link href="/assets/demo.css" rel="stylesheet"/>
</head>
<body class="bg-surface-dim text-on-surface min-h-screen relative overflow-hidden font-body">
<!-- Overlay -->
<div class="fixed inset-0 bg-black/70 z-40"></div>
<!-- Bottom Sheet Container -->
<div class="fixed bottom-0 left-0 w-full max-h-[88%] bg-[#141414] z-50 rounded-t-[24px] flex flex-col overflow-hidden shadow-2xl">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-2 pb-4">
<div class="w-9 h-1 bg-[#333333] rounded-full"></div>
</div>
<!-- Header -->
<div class="px-4 pb-4 flex justify-between items-center border-b border-[#262626]">
<h2 class="text-[17px] font-bold text-[#F0F0F0]">FİLTRELE</h2>
<button class="text-[13px] font-semibold text-[#C8F135]">Temizle</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto p-4 space-y-8 pb-24">
<!-- SECTION 1: AKTİVİTE TÜRÜ -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-3">AKTİVİTE TÜRÜ</h3>
<div class="grid grid-cols-2 gap-[10px]">
<button class="h-9 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center gap-2 text-[#888888]">
<span class="material-symbols-outlined text-sm">fitness_center</span>
<span class="text-xs font-medium">Fitness</span>
</button>
<button class="h-9 bg-[#C8F135]/10 border border-[#C8F135] rounded-[10px] flex items-center justify-center gap-2 text-[#C8F135]">
<span class="material-symbols-outlined text-sm">pool</span>
<span class="text-xs font-medium">Yüzme</span>
</button>
<button class="h-9 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center gap-2 text-[#888888]">
<span class="material-symbols-outlined text-sm">sports_tennis</span>
<span class="text-xs font-medium">Tenis</span>
</button>
<button class="h-9 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center gap-2 text-[#888888]">
<span class="material-symbols-outlined text-sm">directions_run</span>
<span class="text-xs font-medium">Koşu</span>
</button>
</div>
</section>
<!-- SECTION 2: MESAFE -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-8">MESAFE</h3>
<div class="relative w-full px-2">
<!-- Track -->
<div class="absolute top-1/2 left-0 w-full h-1 bg-[#2A2A2A] rounded-full -translate-y-1/2"></div>
<div class="absolute top-1/2 left-0 w-[30%] h-1 bg-[#C8F135] rounded-full -translate-y-1/2"></div>
<!-- Thumb -->
<div class="absolute top-1/2 left-[30%] w-6 h-6 bg-white rounded-full border border-[#E5E5E5] -translate-x-1/2 -translate-y-1/2 shadow-sm"></div>
<!-- Value Pill -->
<div class="absolute bottom-6 left-[30%] bg-[#C8F135] text-[#0A0A0A] text-xs font-bold px-2 py-0.5 rounded-full -translate-x-1/2 whitespace-nowrap tabular-nums">
                        3 km
                    </div>
</div>
<div class="flex justify-between text-[#888888] text-xs mt-3 tabular-nums">
<span>0 km</span>
<span>10+ km</span>
</div>
</section>
<!-- SECTION 3: SAAT DİLİMİ -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-3">SAAT DİLİMİ</h3>
<div class="flex gap-[10px] overflow-x-auto pb-2 -mx-4 px-4 snap-x">
<button class="shrink-0 h-9 px-4 bg-[#C8F135]/10 border border-[#C8F135] rounded-[10px] flex items-center justify-center text-[#C8F135] text-xs font-medium snap-start">
                        Sabah 06–12
                    </button>
<button class="shrink-0 h-9 px-4 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center text-[#888888] text-xs font-medium snap-start">
                        Öğlen 12–17
                    </button>
<button class="shrink-0 h-9 px-4 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center text-[#888888] text-xs font-medium snap-start">
                        Akşam 17–21
                    </button>
<button class="shrink-0 h-9 px-4 bg-[#1C1C1C] border border-[#262626] rounded-[10px] flex items-center justify-center text-[#888888] text-xs font-medium snap-start">
                        Gece 21+
                    </button>
</div>
</section>
<!-- SECTION 4: KREDİ MİKTARI -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-8">KREDİ MİKTARI</h3>
<div class="relative w-full px-2">
<div class="absolute top-1/2 left-0 w-full h-1 bg-[#2A2A2A] rounded-full -translate-y-1/2"></div>
<div class="absolute top-1/2 left-0 w-[40%] h-1 bg-[#C8F135] rounded-full -translate-y-1/2"></div>
<div class="absolute top-1/2 left-[40%] w-6 h-6 bg-white rounded-full border border-[#E5E5E5] -translate-x-1/2 -translate-y-1/2 shadow-sm"></div>
<div class="absolute bottom-6 left-[40%] bg-[#C8F135] text-[#0A0A0A] text-xs font-bold px-2 py-0.5 rounded-full -translate-x-1/2 whitespace-nowrap tabular-nums">
                        2 kredi
                    </div>
</div>
<div class="flex justify-between text-[#888888] text-xs mt-3 tabular-nums">
<span>1</span>
<span>5</span>
</div>
</section>
<!-- SECTION 5: MİNİMUM PUAN -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-3">MİNİMUM PUAN</h3>
<div class="flex items-center gap-3">
<div class="flex text-[#C8F135]">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-[28px] text-[#2A2A2A]" style="font-variation-settings: 'FILL' 0;">star</span>
</div>
<span class="text-[#F0F0F0] text-sm font-medium">4★ ve üzeri</span>
</div>
</section>
<!-- SECTION 6: SIRALAMA -->
<section>
<h3 class="text-[10px] font-bold text-[#888888] tracking-[0.1em] uppercase mb-3">SIRALAMA</h3>
<div class="space-y-4">
<label class="flex items-center justify-between cursor-pointer">
<span class="text-[#F0F0F0] text-sm font-medium">En Yakın</span>
<div class="w-5 h-5 rounded-full border border-[#C8F135] flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-[#C8F135]"></div>
</div>
</label>
<label class="flex items-center justify-between cursor-pointer">
<span class="text-[#888888] text-sm font-medium">En Yüksek Puan</span>
<div class="w-5 h-5 rounded-full border border-[#383838]"></div>
</label>
<label class="flex items-center justify-between cursor-pointer">
<span class="text-[#888888] text-sm font-medium">En Az Kredi</span>
<div class="w-5 h-5 rounded-full border border-[#383838]"></div>
</label>
<label class="flex items-center justify-between cursor-pointer">
<span class="text-[#888888] text-sm font-medium">En Çok Rezervasyon</span>
<div class="w-5 h-5 rounded-full border border-[#383838]"></div>
</label>
</div>
</section>
</div>
<!-- Sticky Bottom -->
<div class="absolute bottom-0 left-0 w-full p-4 border-t border-[#262626] bg-[#141414]">
<a class="w-full h-[54px] bg-[#C8F135] text-[#0A0A0A] font-semibold text-base rounded-[28px] flex items-center justify-center" href="/discover/">
                14 Sonucu Gör
            </a>
</div>
</div>
<script defer src="/assets/demo.js"></script>
</body></html>
