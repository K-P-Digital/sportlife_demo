<h1 class="text-[32px] font-[800] leading-tight text-[#F5F5F5] tracking-tight">3 tıkta spor yap.</h1>

</div>

<div class="absolute left-[41px] top-10 bottom-10 w-[2px] bg-[#262626] z-0"></div>

</div>
<div class="text-[16px] font-bold text-[#F5F5F5] opacity-60">Üye Ol</div>
</div>

</div>
<div class="flex flex-col">
<div class="text-[18px] font-bold text-[#F5F5F5]">Rezerve Et</div>
