<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>

                "surface-container-lowest": "#0f0d13",
                "surface-variant": "#36343a",
                "primary-container": "#6750a4",
                "tertiary-container": "#c9a74d",
                "on-tertiary-container": "#503d00",
                "inverse-on-surface": "#322f35",

                "on-background": "#e6e0e9",
                "tertiary-fixed-dim": "#e7c365",
                "secondary-fixed-dim": "#cdc0e9",

                "tertiary-fixed": "#ffdf93",

                "secondary": "#cdc0e9",

        "borderRadius": {

        "fontFamily": {
                "headline": [

<style>
  body {
    background-color: #050505;
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    font-family: 'Public Sans', sans-serif;
  }
  
  .atmospheric-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(212, 255, 79, 0.04) 0%, rgba(212, 255, 79, 0) 70%);
    pointer-events: none;
    z-index: 0;
  }

  .brand-container {
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .brand-title {
    font-size: 56px;
    font-weight: 800;
    color: #F5F5F5;
    letter-spacing: -2.5px;
    line-height: 1;
    margin: 0;
  }

  .brand-rule {
    width: 64px;
    height: 1px;
    background-color: #D4FF4F;
    margin-top: 8px;
    margin-bottom: 14px;
  }

  .brand-subtitle {
    font-size: 11px;
    font-weight: 500;
    color: #6B6B6B;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }

  .loader-container {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
  }

  .loader-track {
    width: 200px;
    height: 1.5px;
    background-color: #1F1F1F;
    position: relative;
    overflow: hidden;
  }

  .loader-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 70%;
    background-color: #D4FF4F;
  }

  .loader-text {
    margin-top: 8px;
    font-size: 9px;
    color: #3A3A3A;
    font-weight: 400;
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <link href="/assets/demo.css" rel="stylesheet"/>
</head>
<body>
<div class="atmospheric-glow"></div>
<div class="brand-container">
<h1 class="brand-title">SPORTLIFE</h1>
<div class="brand-rule"></div>
<div class="brand-subtitle">ISTANBUL</div>
</div>
<div class="loader-container">
<div class="loader-track">
<div class="loader-fill"></div>
</div>
<div class="loader-text">Yükleniyor...</div>
</div>
<script defer src="/assets/demo.js"></script>
</body></html>
