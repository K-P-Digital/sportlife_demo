<body class="min-h-screen flex flex-col justify-center px-4 max-w-md mx-auto">

<div class="flex flex-col items-center mb-8 pt-8">

<div class="mb-10 text-center">

</div>
<!-- Form -->
<form class="space-y-6 flex-grow flex flex-col">
<div class="space-y-4">
<div>
<label class="sr-only" for="email">E-posta</label>
<div class="relative bg-[#161616] rounded-xl h-[54px] flex items-center px-4 border border-transparent focus-within:border-[#383838] transition-colors">
<input class="w-full bg-transparent border-none text-white focus:ring-0 p-0 text-[16px]" id="email" name="email" placeholder="E-posta" type="email" value="ayse@email.com"/>
</div>
</div>
<div>
<label class="sr-only" for="password">Şifre</label>
<div class="relative bg-[#161616] rounded-xl h-[54px] flex items-center px-4 border border-transparent focus-within:border-[#383838] transition-colors">
<input class="w-full bg-transparent border-none text-white focus:ring-0 p-0 text-[16px] placeholder-[#A1A1A1]" id="password" name="password" placeholder="Şifre" type="password"/>
<button class="text-[#A1A1A1] hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-[#D4FF4F] text-sm font-medium hover:opacity-80 transition-opacity" href="#">Şifreni mi unuttun?</a>
</div>
</div>
<div class="mt-8 space-y-4">
<!-- Primary CTA -->
<button class="w-full h-[54px] bg-[#D4FF4F] text-[#050505] rounded-[28px] font-semibold text-[16px] flex items-center justify-center gap-2 hover:opacity-90 transition-opacity" type="submit">
<span>Giriş Yap</span>
<span class="material-symbols-outlined font-bold text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
<!-- Biometric Option -->
<button class="w-full h-[54px] bg-[#161616] border border-[#262626] rounded-xl flex items-center justify-center gap-3 text-white hover:bg-[#262626] transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">face</span>
<span class="font-medium text-[16px]">Face ID ile Giriş</span>
</button>
</div>
</form>
<!-- Divider & Social -->
<div class="mt-10 mb-8 space-y-6">
<div class="flex items-center gap-4">
<div class="h-px bg-[#262626] flex-1"></div>
<span class="text-[#A1A1A1] text-sm">Veya</span>
<div class="h-px bg-[#262626] flex-1"></div>
</div>
<div class="flex gap-4">
<button class="flex-1 h-[54px] bg-[#161616] border border-[#262626] rounded-xl flex items-center justify-center hover:bg-[#262626] transition-colors">
