<!doctype html>
<html lang="tr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sportlife Demo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Public+Sans:wght@400;500;600;700;800;900&family=Epilogue:wght@500;700;800;900&family=Lexend:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              sport: {
                bg: "#050505",
                surface: "#0F0F0F",
                panel: "#161616",
                elevated: "#1F1F1F",
                border: "#262626",
                borderStrong: "#383838",
                lime: "#D4FF4F",
                limeAlt: "#C5F833",
                text: "#F5F5F5",
                muted: "#A1A1A1",
                dim: "#6B6B6B"
              }
            },
            fontFamily: {
              sans: ["Inter", "Public Sans", "system-ui", "sans-serif"],
              public: ["Public Sans", "system-ui", "sans-serif"],
              epilogue: ["Epilogue", "system-ui", "sans-serif"],
              lexend: ["Lexend", "system-ui", "sans-serif"]
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
